name: Daily Scraper Run

on:
  schedule:
    # Every morning at 7am UTC (2am CST / 1am CDT)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to commit updated JSON files back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fresh Hennepin tax roll
        run: |
          mkdir -p data_raw
          echo "Downloading Hennepin County parcels CSV from ArcGIS Hub..."
          # Hennepin County Parcels — official open data CSV
          # Dataset: 7975aabf6e1e42998a40a4b085ffefdf_1 (County Parcels)
          DATASET_ID="7975aabf6e1e42998a40a4b085ffefdf_1"
          DOWNLOAD_URL="https://opendata.arcgis.com/api/v3/datasets/${DATASET_ID}/downloads/data?format=csv&spatialRefId=4326&where=1%3D1"
          curl -L --max-time 600 \
            -H "User-Agent: Mozilla/5.0 (MotivatedSeller-Intel-Bot)" \
            -o data_raw/County_Parcels.csv \
            "$DOWNLOAD_URL"
          if [ -f data_raw/County_Parcels.csv ]; then
            SIZE=$(stat -c %s data_raw/County_Parcels.csv 2>/dev/null || stat -f %z data_raw/County_Parcels.csv)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Downloaded ${SIZE_MB} MB"
            if [ "$SIZE_MB" -lt 50 ]; then
              echo "WARNING: File suspiciously small (${SIZE_MB} MB) — may be an error response"
              head -c 500 data_raw/County_Parcels.csv
              echo ""
            fi
          else
            echo "Download failed"
          fi
        continue-on-error: true

      - name: Re-score tax roll
        run: |
          if [ -f data_raw/County_Parcels.csv ]; then
            SIZE=$(stat -c %s data_raw/County_Parcels.csv 2>/dev/null || stat -f %z data_raw/County_Parcels.csv)
            if [ "$SIZE" -gt 50000000 ]; then
              echo "Re-scoring all parcels (CSV is ${SIZE} bytes)..."
              python scripts/process_parcels.py
            else
              echo "CSV too small to be valid — skipping re-score, using existing leads.json"
            fi
          else
            echo "No tax roll CSV — using existing leads.json"
          fi
        continue-on-error: true

      - name: Run all scrapers
        run: python scripts/run_all.py
        continue-on-error: true  # Don't fail the whole run if one scraper errors

      - name: Check what changed
        run: |
          git diff --stat docs/data/ || true
          echo "Files in docs/data/:"
          ls -lh docs/data/

      - name: Commit and push updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MS INTEL Bot"
          git add docs/data/leads.json || true
          git add docs/data/leads_enhanced.json || true
          git add docs/data/code_violations.json || true
          git add docs/data/foreclosures.json || true
          git add docs/data/tax_forfeiture.json || true
          git add docs/data/new_signal_candidates.json || true
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily scraper run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
