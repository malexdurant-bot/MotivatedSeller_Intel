name: Daily Scraper Run

on:
  schedule:
    # Every morning at 7am UTC (2am CST / 1am CDT)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to commit updated JSON files back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download fresh Hennepin tax roll
        run: |
          mkdir -p data_raw
          echo "Downloading Hennepin County parcels CSV from ArcGIS Hub..."
          
          # Primary URL — ArcGIS Hub API v3
          DATASET_ID="7975aabf6e1e42998a40a4b085ffefdf_1"
          URL1="https://opendata.arcgis.com/api/v3/datasets/${DATASET_ID}/downloads/data?format=csv&spatialRefId=4326&where=1%3D1"
          
          # Fallback URL — ArcGIS feature service direct export
          URL2="https://services.arcgis.com/afSMGVsC7QlRK1kZ/arcgis/rest/services/County_Parcels/FeatureServer/1/query?where=1%3D1&outFields=*&f=geojson"
          
          # Try primary URL
          echo "Trying primary URL..."
          curl -L --max-time 900 --retry 2             -H "User-Agent: Mozilla/5.0 (compatible; research-bot/1.0)"             -H "Accept: text/csv,application/csv,*/*"             -o data_raw/County_Parcels.csv             "$URL1"
          
          SIZE=$(stat -c %s data_raw/County_Parcels.csv 2>/dev/null || echo "0")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Primary download: ${SIZE_MB} MB (${SIZE} bytes)"
          
          # Validate — a real 448K parcel CSV should be >100MB
          if [ "$SIZE" -lt 100000000 ]; then
            echo "Primary download too small or failed. First 300 bytes:"
            head -c 300 data_raw/County_Parcels.csv || true
            echo ""
            echo "File may be an error response or rate-limited. Keeping whatever downloaded."
            echo "The re-score step will validate before proceeding."
          else
            echo "✅ Download successful: ${SIZE_MB} MB"
            echo "First line (headers):"
            head -1 data_raw/County_Parcels.csv
          fi
        continue-on-error: true

      - name: Re-score tax roll
        run: |
          if [ -f data_raw/County_Parcels.csv ]; then
            SIZE=$(stat -c %s data_raw/County_Parcels.csv 2>/dev/null || stat -f %z data_raw/County_Parcels.csv)
            if [ "$SIZE" -gt 50000000 ]; then
              echo "Re-scoring all parcels (CSV is ${SIZE} bytes)..."
              python scripts/process_parcels.py
            else
              echo "CSV too small to be valid — skipping re-score, using existing leads.json"
            fi
          else
            echo "No tax roll CSV — using existing leads.json"
          fi
        continue-on-error: true

      - name: Run all scrapers
        run: python scripts/run_all.py
        continue-on-error: true  # Don't fail the whole run if one scraper errors

      - name: Check what changed
        run: |
          git diff --stat docs/data/ || true
          echo "Files in docs/data/:"
          ls -lh docs/data/

      - name: Push leads to GoHighLevel (Jarvis)
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: python scripts/push_to_ghl.py
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MS INTEL Bot"
          git add docs/data/leads.json || true
          git add docs/data/leads_enhanced.json || true
          git add docs/data/code_violations.json || true
          git add docs/data/foreclosures.json || true
          git add docs/data/tax_forfeiture.json || true
          git add docs/data/new_signal_candidates.json || true
          git add docs/data/ghl_push_log.json || true
          git add docs/data/ghl_pushed_pids.json || true
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Daily scraper run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
